name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build -v
      - run: swift test -v

  build-release:
    name: Build Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
      - run: .build/release/zeplin-cli --version
      - uses: actions/upload-artifact@v4
        with:
          name: zeplin-cli-macos
          path: .build/release/zeplin-cli

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift package dump-package

  cli-smoke-test:
    name: CLI Smoke Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - name: Test help for all commands
        run: |
          set -e
          .build/debug/zeplin-cli --help
          .build/debug/zeplin-cli auth --help
          .build/debug/zeplin-cli organizations --help
          .build/debug/zeplin-cli projects --help
          .build/debug/zeplin-cli screens --help
          .build/debug/zeplin-cli components --help
          .build/debug/zeplin-cli styleguides --help
          .build/debug/zeplin-cli colors --help
          .build/debug/zeplin-cli text-styles --help
          .build/debug/zeplin-cli spacing --help
          .build/debug/zeplin-cli design-tokens --help
          .build/debug/zeplin-cli flows --help
          .build/debug/zeplin-cli members --help
          .build/debug/zeplin-cli webhooks --help
          .build/debug/zeplin-cli notifications --help
          .build/debug/zeplin-cli user --help
          .build/debug/zeplin-cli screens layers --help
          .build/debug/zeplin-cli screens layer-image --help
      - name: Test version
        run: |
          VERSION=$(.build/debug/zeplin-cli --version)
          echo "Version: $VERSION"
          [ -n "$VERSION" ]
      - name: Test missing credentials error
        run: |
          set +e
          .build/debug/zeplin-cli user 2>&1 | grep -q "credentials"
          [ $? -eq 0 ] && echo "PASS: Got expected credentials error" || echo "PASS: Command ran (may have creds)"
